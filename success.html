<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة الدفع</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .success { color: #27ae60; }
        .fail { color: #c0392b; }
        .details { color: #7f8c8d; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 id="status-title">جاري التحقق من حالة الدفع...</h2>
        <div class="details">
            <p id="payment-id"></p>
            <p id="payment-message"></p>
        </div>
        <a href="index.html" style="display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db;">العودة للمتجر</a>
    </div>

    <script>
        // قراءة المتغيرات من الرابط (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('id');
        const status = urlParams.get('status');
        const message = urlParams.get('message');

        const titleEl = document.getElementById('status-title');
        const idEl = document.getElementById('payment-id');
        const msgEl = document.getElementById('payment-message');

        // تغيير الواجهة بناءً على حالة الدفع
        if (status === 'paid') {
            titleEl.innerText = "✅ تم الدفع بنجاح!";
            titleEl.className = "success";
        } else if (status === 'failed') {
            titleEl.innerText = "❌ فشلت عملية الدفع";
            titleEl.className = "fail";
        } else {
            titleEl.innerText = "⚠️ حالة غير معروفة";
        }

        // عرض التفاصيل إذا كانت موجودة
        if (paymentId) idEl.innerText = "رقم العملية (ID): " + paymentId;
        if (message) msgEl.innerText = "رسالة البوابة: " + message;
    </script>

</body>
</html>
